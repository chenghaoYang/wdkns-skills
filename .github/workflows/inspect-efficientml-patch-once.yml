name: Inspect EfficientML patch workflow once

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/inspect-efficientml-patch-once.yml"

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect latest patch run and publish status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          workflow='patch-efficientml-review-main-once.yml'
          endpoint="/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs?per_page=5"
          runs="$(gh api "$endpoint")"
          run_id="$(jq -r '.workflow_runs[0].id // empty' <<< "$runs")"

          if [[ -z "$run_id" ]]; then
            report='No workflow run was found for patch-efficientml-review-main-once.yml.'
          else
            jobs="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100")"
            report="$(
              {
                echo 'Latest run:'
                jq '{id, html_url, status, conclusion, event, head_branch, head_sha, created_at, updated_at}' <<< "$runs" | jq '.workflow_runs[0]'
                echo
                echo 'Jobs:'
                jq '[.jobs[] | {id, name, status, conclusion, started_at, completed_at, steps:[.steps[] | {name,status,conclusion,number}]}]' <<< "$jobs"
              }
            )"
          fi

          encoded="$(printf '%s\n' "$report" | base64 -w 0)"
          path='.github/efficientml-patch-inspection.txt'
          api_path="/repos/${GITHUB_REPOSITORY}/contents/${path}"
          current_sha="$(gh api "${api_path}?ref=main" --jq '.sha' 2>/dev/null || true)"
          if [[ -n "$current_sha" ]]; then
            gh api --method PUT "$api_path" \
              -f message='chore: record EfficientML patch inspection' \
              -f content="$encoded" \
              -f sha="$current_sha" \
              -f branch=main >/dev/null
          else
            gh api --method PUT "$api_path" \
              -f message='chore: record EfficientML patch inspection' \
              -f content="$encoded" \
              -f branch=main >/dev/null
          fi
