name: Patch EfficientML review comments once

on:
  push:
    branches:
      - "fix/efficientml-review-comments"
    paths:
      - ".github/workflows/patch-efficientml-review-once.yml"

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out fix branch
        uses: actions/checkout@v5
        with:
          ref: fix/efficientml-review-comments

      - name: Apply focused review fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          prepare_path = Path("scripts/prepare_efficientml_lecture.py")
          prepare = prepare_path.read_text(encoding="utf-8")
          old_prepare = """    except Exception:
              temporary.unlink(missing_ok=True)
              raise
          """
          new_prepare = """    except Exception as exc:
              temporary.unlink(missing_ok=True)
              raise PreparationError(
                  f"Failed to download {url} to {destination}: {exc}"
              ) from exc
          """
          if prepare.count(old_prepare) != 1:
              raise SystemExit("prepare exception block did not match exactly once")
          prepare_path.write_text(prepare.replace(old_prepare, new_prepare), encoding="utf-8")

          validator_path = Path("scripts/validate_efficientml_output.py")
          validator = validator_path.read_text(encoding="utf-8")
          old_resolver = """def resolve_graphic(tex_dir: Path, raw: str) -> Path | None:
              raw = raw.strip()
              candidate = tex_dir / raw
              if candidate.exists():
                  return candidate.resolve()
              if candidate.suffix:
                  return None
              for extension in IMAGE_EXTENSIONS:
                  extended = candidate.with_suffix(extension)
                  if extended.exists():
                      return extended.resolve()
              return None
          """
          new_resolver = """def _resolved_file_within(root: Path, candidate: Path) -> Path | None:
              try:
                  resolved = candidate.resolve(strict=True)
                  resolved.relative_to(root)
              except (OSError, ValueError):
                  return None
              return resolved if resolved.is_file() else None


          def resolve_graphic(tex_dir: Path, raw: str) -> Path | None:
              raw = raw.strip()
              relative = Path(raw)
              if not raw or relative.is_absolute():
                  return None

              try:
                  root = tex_dir.resolve(strict=True)
              except OSError:
                  return None

              candidate = root / relative
              resolved = _resolved_file_within(root, candidate)
              if resolved is not None:
                  return resolved
              if candidate.suffix:
                  return None
              for extension in IMAGE_EXTENSIONS:
                  resolved = _resolved_file_within(root, candidate.with_suffix(extension))
                  if resolved is not None:
                      return resolved
              return None
          """
          if validator.count(old_resolver) != 1:
              raise SystemExit("graphic resolver block did not match exactly once")
          validator = validator.replace(old_resolver, new_resolver)

          old_logs = """        first_log = command_output(xelatex, cwd=tex_path.parent)
                  second_log = command_output(xelatex, cwd=tex_path.parent)
                  (validation_dir / "xelatex-pass-1.log").write_text(
                      first_log, encoding="utf-8"
                  )
                  (validation_dir / "xelatex-pass-2.log").write_text(
                      second_log, encoding="utf-8"
                  )
          """
          new_logs = """        first_log = command_output(xelatex, cwd=tex_path.parent)
                  (validation_dir / "xelatex-pass-1.log").write_text(
                      first_log, encoding="utf-8"
                  )
                  second_log = command_output(xelatex, cwd=tex_path.parent)
                  (validation_dir / "xelatex-pass-2.log").write_text(
                      second_log, encoding="utf-8"
                  )
          """
          if validator.count(old_logs) != 1:
              raise SystemExit("XeLaTeX log block did not match exactly once")
          validator = validator.replace(old_logs, new_logs)

          old_pdfinfo = """        delivered_info = command_output(["pdfinfo", str(delivered_pdf)])
                  rebuilt_info = command_output(["pdfinfo", str(rebuilt_pdf)])
          """
          new_pdfinfo = """        # Normalize the shipped artifact to the exact build that passed validation.
                  shutil.copy2(rebuilt_pdf, delivered_pdf)
                  delivered_info = command_output(["pdfinfo", str(delivered_pdf)])
                  rebuilt_info = command_output(["pdfinfo", str(rebuilt_pdf)])
          """
          if validator.count(old_pdfinfo) != 1:
              raise SystemExit("PDF info block did not match exactly once")
          validator = validator.replace(old_pdfinfo, new_pdfinfo)
          validator = validator.replace(
              "        pages = pdf_page_count(rebuilt_info)\n",
              "        pages = pdf_page_count(delivered_info)\n",
              1,
          )
          old_render = """                    str(rebuilt_pdf),
                              str(prefix),
          """
          new_render = """                    str(delivered_pdf),
                              str(prefix),
          """
          if validator.count(old_render) != 1:
              raise SystemExit("representative-page render block did not match exactly once")
          validator = validator.replace(old_render, new_render)
          validator = validator.replace(
              "    except (ValidationError, FileNotFoundError, json.JSONDecodeError) as exc:\n",
              "    except (ValidationError, OSError, KeyError, TypeError, json.JSONDecodeError) as exc:\n",
              1,
          )
          validator_path.write_text(validator, encoding="utf-8")
          PY

      - name: Compile and run focused unit tests
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile \
            scripts/prepare_efficientml_lecture.py \
            scripts/validate_efficientml_output.py
          python3 - <<'PY'
          import importlib.util
          import tempfile
          from pathlib import Path
          from unittest import mock

          def load(name: str, path: str):
              spec = importlib.util.spec_from_file_location(name, path)
              module = importlib.util.module_from_spec(spec)
              assert spec and spec.loader
              spec.loader.exec_module(module)
              return module

          validator = load("validator", "scripts/validate_efficientml_output.py")
          preparer = load("preparer", "scripts/prepare_efficientml_lecture.py")

          with tempfile.TemporaryDirectory() as temporary:
              base = Path(temporary)
              tex_dir = base / "deliverables"
              assets = tex_dir / "assets"
              assets.mkdir(parents=True)
              good = assets / "good.png"
              good.write_bytes(b"png")
              outside = base / "outside.png"
              outside.write_bytes(b"png")

              assert validator.resolve_graphic(tex_dir, "assets/good.png") == good.resolve()
              assert validator.resolve_graphic(tex_dir, "assets/good") == good.resolve()
              assert validator.resolve_graphic(tex_dir, str(outside.resolve())) is None
              assert validator.resolve_graphic(tex_dir, "../outside.png") is None
              assert validator.resolve_graphic(tex_dir, "assets") is None

              destination = base / "download.pdf"
              with mock.patch.object(
                  preparer.urllib.request,
                  "urlopen",
                  side_effect=OSError("simulated network failure"),
              ):
                  try:
                      preparer.download_file("https://example.invalid/file.pdf", destination)
                  except preparer.PreparationError as exc:
                      assert "Failed to download" in str(exc)
                      assert "simulated network failure" in str(exc)
                  else:
                      raise AssertionError("download_file did not wrap the network error")

          print("Focused EfficientML review tests passed.")
          PY

      - name: Commit tested fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/prepare_efficientml_lecture.py scripts/validate_efficientml_output.py
          git diff --cached --check
          git commit -m "fix: harden EfficientML source and asset validation"
          git push origin HEAD:fix/efficientml-review-comments
