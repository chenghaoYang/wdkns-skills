name: Bootstrap EfficientML all lectures once

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bootstrap-efficientml-all-once.yml"

permissions:
  actions: write
  contents: write

concurrency:
  group: bootstrap-efficientml-all-once
  cancel-in-progress: false

jobs:
  dispatch:
    name: Dispatch the 23-lecture render
    if: github.repository == 'chenghaoYang/wdkns-skills'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch once and publish machine-readable status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          workflow="render-efficientml-2023.yml"
          branch="${GITHUB_REF_NAME}"
          status_path=".github/efficientml-bootstrap-status.json"
          course_merge_time="2026-07-13T07:00:00Z"

          write_status() {
            local payload="$1"
            local encoded endpoint current_sha
            encoded="$(printf '%s\n' "$payload" | base64 -w 0)"
            endpoint="/repos/${GITHUB_REPOSITORY}/contents/${status_path}"
            current_sha="$(gh api "${endpoint}?ref=${branch}" --jq '.sha' 2>/dev/null || true)"

            if [[ -n "$current_sha" ]]; then
              gh api --method PUT "$endpoint" \
                -f message='chore: record EfficientML bootstrap status' \
                -f content="$encoded" \
                -f sha="$current_sha" \
                -f branch="$branch" >/dev/null
            else
              gh api --method PUT "$endpoint" \
                -f message='chore: record EfficientML bootstrap status' \
                -f content="$encoded" \
                -f branch="$branch" >/dev/null
            fi
          }

          latest_row="$(
            gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs?event=workflow_dispatch&branch=${branch}&per_page=10" \
              --jq ".workflow_runs[] | select(.created_at >= \"${course_merge_time}\") | [.id, .html_url, .status, (.conclusion // \"\"), .created_at] | @tsv" \
              | head -n 1 || true
          )"

          if [[ -n "$latest_row" ]]; then
            IFS=$'\t' read -r run_id run_url run_status run_conclusion created_at <<< "$latest_row"
            payload="$(jq -n \
              --arg state 'already_dispatched' \
              --arg run_id "$run_id" \
              --arg run_url "$run_url" \
              --arg status "$run_status" \
              --arg conclusion "$run_conclusion" \
              --arg created_at "$created_at" \
              --arg observed_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{state:$state, run_id:$run_id, run_url:$run_url, status:$status, conclusion:$conclusion, created_at:$created_at, observed_at:$observed_at}')"
            write_status "$payload"
            echo "An EfficientML all-lecture workflow dispatch already exists: ${run_url}" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [[ -z "$OPENAI_API_KEY" ]]; then
            payload="$(jq -n \
              --arg state 'blocked_missing_openai_api_key' \
              --arg observed_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{state:$state, observed_at:$observed_at, message:"Repository secret OPENAI_API_KEY is not configured; no render was dispatched."}')"
            write_status "$payload"
            echo "::error::Repository secret OPENAI_API_KEY is not configured; no render was dispatched."
            exit 1
          fi

          started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/dispatches" \
            -f ref="$branch" \
            -f 'inputs[lecture]=all' \
            -f 'inputs[model]='

          dispatched_row=""
          for _ in {1..12}; do
            sleep 5
            dispatched_row="$(
              gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs?event=workflow_dispatch&branch=${branch}&per_page=10" \
                --jq ".workflow_runs[] | select(.created_at >= \"${started_at}\") | [.id, .html_url, .status, (.conclusion // \"\"), .created_at] | @tsv" \
                | head -n 1 || true
            )"
            [[ -n "$dispatched_row" ]] && break
          done

          if [[ -n "$dispatched_row" ]]; then
            IFS=$'\t' read -r run_id run_url run_status run_conclusion created_at <<< "$dispatched_row"
            payload="$(jq -n \
              --arg state 'dispatched' \
              --arg run_id "$run_id" \
              --arg run_url "$run_url" \
              --arg status "$run_status" \
              --arg conclusion "$run_conclusion" \
              --arg created_at "$created_at" \
              --arg observed_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{state:$state, run_id:$run_id, run_url:$run_url, status:$status, conclusion:$conclusion, created_at:$created_at, observed_at:$observed_at}')"
            write_status "$payload"
            echo "The all-lecture EfficientML render was dispatched: ${run_url}" >> "$GITHUB_STEP_SUMMARY"
          else
            payload="$(jq -n \
              --arg state 'dispatch_accepted_run_not_yet_visible' \
              --arg observed_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{state:$state, observed_at:$observed_at}')"
            write_status "$payload"
            echo "Dispatch API accepted the request, but the run was not visible within the polling window." >> "$GITHUB_STEP_SUMMARY"
          fi
